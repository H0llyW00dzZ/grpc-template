# Dependabot config for multi-language gRPC project (Go + PHP via buf)

version: 2
updates:
  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "master"

  # Composer (for generated PHP client)
  - package-ecosystem: "composer"
    directory: "/pkg/gen-php"
    schedule:
      interval: "daily"
    target-branch: "master"
