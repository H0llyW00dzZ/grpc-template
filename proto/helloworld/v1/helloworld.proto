syntax = "proto3";

package helloworld.v1;

option go_package = "github.com/H0llyW00dzZ/grpc-template/pkg/gen/helloworld/v1;helloworldv1";

// Greeter is a sample gRPC service demonstrating unary and server-streaming RPCs.
service Greeter {
  // SayHello sends a single greeting (unary RPC).
  rpc SayHello(HelloRequest) returns (HelloReply) {}

  // SayHelloServerStream sends multiple greetings over a server stream.
  rpc SayHelloServerStream(HelloRequest) returns (stream HelloReply) {}
}

// HelloRequest is the request message for the Greeter service.
message HelloRequest {
  // name is the name to greet.
  string name = 1;
}

// HelloReply is the response message for the Greeter service.
message HelloReply {
  // message is the greeting text.
  string message = 1;
}
