syntax = "proto3";

package task.v1;

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/H0llyW00dzZ/grpc-template/pkg/gen/task/v1;taskv1";
option php_namespace = "Task\\V1";
option php_metadata_namespace = "GPBMetadata\\Task\\V1";

// TaskService manages asynchronous job/task execution.
//
// Designed for workloads such as AI inference pipelines, batch processing,
// ETL jobs, and any long-running operation that benefits from async execution
// with progress tracking.
service TaskService {
  // SubmitTask submits a new task for async execution.
  rpc SubmitTask(SubmitTaskRequest) returns (SubmitTaskResponse) {}

  // GetTaskStatus retrieves the current status of a task.
  rpc GetTaskStatus(GetTaskStatusRequest) returns (GetTaskStatusResponse) {}

  // WatchTask streams real-time status updates for a task until completion.
  rpc WatchTask(WatchTaskRequest) returns (stream WatchTaskResponse) {}

  // CancelTask requests cancellation of a running task.
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse) {}

  // ListTasks lists tasks with optional filtering and pagination.
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse) {}
}

// TaskStatus represents the lifecycle state of a task.
enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_PENDING = 1;
  TASK_STATUS_RUNNING = 2;
  TASK_STATUS_COMPLETED = 3;
  TASK_STATUS_FAILED = 4;
  TASK_STATUS_CANCELLED = 5;
}

// TaskInfo contains full metadata about a task.
message TaskInfo {
  // task_id is the unique identifier for this task.
  string task_id = 1;

  // task_type is the type/category of the task (e.g., "inference", "export").
  string task_type = 2;

  // status is the current lifecycle state.
  TaskStatus status = 3;

  // progress is the completion percentage (0-100).
  int32 progress = 4;

  // message is a human-readable status message.
  string message = 5;

  // result is the task output (present when completed).
  google.protobuf.Any result = 6;

  // error_detail contains error info if the task failed.
  string error_detail = 7;

  // created_at is when the task was submitted.
  google.protobuf.Timestamp created_at = 8;

  // updated_at is the last status update time.
  google.protobuf.Timestamp updated_at = 9;
}

// TaskEvent is a status update emitted during task execution.
message TaskEvent {
  // task_id is the task this event belongs to.
  string task_id = 1;

  // status is the current task state.
  TaskStatus status = 2;

  // progress is the completion percentage (0-100).
  int32 progress = 3;

  // message is a human-readable progress message.
  string message = 4;

  // timestamp is when this event occurred.
  google.protobuf.Timestamp timestamp = 5;
}

// SubmitTaskRequest creates a new async task.
message SubmitTaskRequest {
  // task_type is the type/category of work to perform.
  string task_type = 1;

  // payload is the task input data.
  google.protobuf.Any payload = 2;

  // priority is an optional priority level (higher = more urgent).
  int32 priority = 3;

  // metadata contains optional key-value pairs for routing or labeling.
  map<string, string> metadata = 4;
}

// SubmitTaskResponse is returned after a task is accepted.
message SubmitTaskResponse {
  // task_id is the assigned task identifier.
  string task_id = 1;
}

// GetTaskStatusRequest identifies the task to query.
message GetTaskStatusRequest {
  // task_id is the task identifier.
  string task_id = 1;
}

// GetTaskStatusResponse contains the full task metadata.
message GetTaskStatusResponse {
  // task is the task metadata.
  TaskInfo task = 1;
}

// WatchTaskRequest identifies the task to watch.
message WatchTaskRequest {
  // task_id is the task identifier.
  string task_id = 1;
}

// WatchTaskResponse wraps a task event in the watch stream.
message WatchTaskResponse {
  // event is the task status update.
  TaskEvent event = 1;
}

// CancelTaskRequest identifies the task to cancel.
message CancelTaskRequest {
  // task_id is the task identifier.
  string task_id = 1;
}

// CancelTaskResponse is the response after requesting cancellation.
message CancelTaskResponse {
  // acknowledged indicates whether the cancellation was accepted.
  bool acknowledged = 1;
}

// ListTasksRequest lists tasks with optional filtering.
message ListTasksRequest {
  // status_filter filters by task status (optional, empty = all).
  TaskStatus status_filter = 1;

  // task_type_filter filters by task type (optional, empty = all).
  string task_type_filter = 2;

  // page_size is the maximum number of tasks to return.
  int32 page_size = 3;

  // page_token is the pagination cursor from a previous call.
  string page_token = 4;
}

// ListTasksResponse contains a page of tasks.
message ListTasksResponse {
  // tasks is the list of task metadata.
  repeated TaskInfo tasks = 1;

  // next_page_token is the cursor for the next page (empty if no more).
  string next_page_token = 2;
}
