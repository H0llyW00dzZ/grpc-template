syntax = "proto3";

package secret.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/H0llyW00dzZ/grpc-template/pkg/gen/secret/v1;secretv1";

// SecretService provides secret and credential management.
//
// Suitable for vault-style secret storage, credential rotation,
// configuration secrets, and any workload requiring secure key management
// with audit trails and version history.
service SecretService {
  // GetSecret retrieves a secret by path.
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse) {}

  // PutSecret creates or updates a secret.
  rpc PutSecret(PutSecretRequest) returns (PutSecretResponse) {}

  // DeleteSecret removes a secret.
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse) {}

  // ListSecrets lists secret paths matching a prefix.
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse) {}

  // RotateSecret triggers a rotation for a secret.
  rpc RotateSecret(RotateSecretRequest) returns (RotateSecretResponse) {}

  // GetSecretVersion retrieves a specific version of a secret.
  rpc GetSecretVersion(GetSecretVersionRequest) returns (GetSecretVersionResponse) {}

  // WatchRotation streams real-time rotation events.
  rpc WatchRotation(WatchRotationRequest) returns (stream WatchRotationResponse) {}
}

// SecretMetadata describes a secret without exposing its value.
message SecretMetadata {
  // path is the secret path (e.g., "database/prod/password").
  string path = 1;

  // current_version is the latest version number.
  int64 current_version = 2;

  // created_at is when the secret was first created.
  google.protobuf.Timestamp created_at = 3;

  // updated_at is when the secret was last modified.
  google.protobuf.Timestamp updated_at = 4;

  // rotation_enabled indicates whether automatic rotation is configured.
  bool rotation_enabled = 5;

  // labels contains optional key-value pairs for organizing secrets.
  map<string, string> labels = 6;
}

// SecretValue contains the secret data.
message SecretValue {
  // data contains the secret key-value pairs.
  map<string, string> data = 1;

  // version is the version number of this value.
  int64 version = 2;

  // created_at is when this version was created.
  google.protobuf.Timestamp created_at = 3;
}

// GetSecretRequest retrieves a secret.
message GetSecretRequest {
  // path is the secret path.
  string path = 1;
}

// GetSecretResponse contains the secret value.
message GetSecretResponse {
  // metadata is the secret metadata.
  SecretMetadata metadata = 1;

  // value is the secret data.
  SecretValue value = 2;
}

// PutSecretRequest creates or updates a secret.
message PutSecretRequest {
  // path is the secret path.
  string path = 1;

  // data contains the secret key-value pairs.
  map<string, string> data = 2;

  // labels contains optional key-value pairs.
  map<string, string> labels = 3;

  // rotation_interval_hours sets automatic rotation (0 = disabled).
  int32 rotation_interval_hours = 4;
}

// PutSecretResponse is returned after storing a secret.
message PutSecretResponse {
  // version is the new version number.
  int64 version = 1;
}

// DeleteSecretRequest removes a secret.
message DeleteSecretRequest {
  // path is the secret path to delete.
  string path = 1;
}

// DeleteSecretResponse is returned after deletion.
message DeleteSecretResponse {
  // deleted indicates whether the secret existed and was removed.
  bool deleted = 1;
}

// ListSecretsRequest lists secret paths.
message ListSecretsRequest {
  // prefix filters paths by prefix.
  string prefix = 1;

  // page_size is the maximum number of secrets to return.
  int32 page_size = 2;

  // page_token is the pagination cursor.
  string page_token = 3;
}

// ListSecretsResponse contains a page of secret metadata.
message ListSecretsResponse {
  // secrets is the list of secret metadata (values are not included).
  repeated SecretMetadata secrets = 1;

  // next_page_token is the cursor for the next page.
  string next_page_token = 2;
}

// RotateSecretRequest triggers a secret rotation.
message RotateSecretRequest {
  // path is the secret to rotate.
  string path = 1;

  // new_data contains the new secret values (optional, auto-generated if empty).
  map<string, string> new_data = 2;
}

// RotateSecretResponse is returned after rotation.
message RotateSecretResponse {
  // new_version is the new version number after rotation.
  int64 new_version = 1;
}

// GetSecretVersionRequest retrieves a specific version.
message GetSecretVersionRequest {
  // path is the secret path.
  string path = 1;

  // version is the version to retrieve.
  int64 version = 2;
}

// GetSecretVersionResponse contains the versioned secret value.
message GetSecretVersionResponse {
  // value is the secret data at the specified version.
  SecretValue value = 1;
}

// WatchRotationRequest subscribes to rotation events.
message WatchRotationRequest {
  // prefix filters by secret path prefix (optional, empty = all).
  string prefix = 1;
}

// WatchRotationResponse wraps a rotation event.
message WatchRotationResponse {
  // path is the rotated secret path.
  string path = 1;

  // old_version is the previous version number.
  int64 old_version = 2;

  // new_version is the new version number.
  int64 new_version = 3;

  // timestamp is when the rotation occurred.
  google.protobuf.Timestamp timestamp = 4;
}
