syntax = "proto3";

package discovery.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/H0llyW00dzZ/grpc-template/pkg/gen/discovery/v1;discoveryv1";
option php_namespace = "Discovery\\V1";
option php_metadata_namespace = "GPBMetadata\\Discovery\\V1";

// DiscoveryService provides service registration and discovery.
//
// Suitable for microservice architectures where services need to find
// each other dynamically without hardcoded addresses.
service DiscoveryService {
  // Register adds a service instance to the registry.
  rpc Register(RegisterRequest) returns (RegisterResponse) {}

  // Deregister removes a service instance from the registry.
  rpc Deregister(DeregisterRequest) returns (DeregisterResponse) {}

  // Lookup returns all healthy instances for a given service name.
  rpc Lookup(LookupRequest) returns (LookupResponse) {}

  // Watch opens a server-streaming connection to receive real-time
  // topology changes for a service (instances added/removed).
  rpc Watch(WatchRequest) returns (stream WatchResponse) {}

  // Heartbeat sends a keep-alive signal for a registered instance.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse) {}
}

// ServiceInstance represents a single running instance of a service.
message ServiceInstance {
  // instance_id is the unique identifier for this instance.
  string instance_id = 1;

  // service_name is the logical service name (e.g., "auth-service").
  string service_name = 2;

  // address is the network address (host:port) of the instance.
  string address = 3;

  // protocol is the communication protocol (e.g., "grpc", "http").
  string protocol = 4;

  // healthy indicates whether the instance is currently healthy.
  bool healthy = 5;

  // metadata contains optional key-value pairs (version, region, tags).
  map<string, string> metadata = 6;

  // registered_at is when the instance was registered.
  google.protobuf.Timestamp registered_at = 7;

  // last_heartbeat is the last time the instance sent a heartbeat.
  google.protobuf.Timestamp last_heartbeat = 8;
}

// RegisterRequest adds a service instance to the registry.
message RegisterRequest {
  // service_name is the logical service name.
  string service_name = 1;

  // address is the network address (host:port).
  string address = 2;

  // protocol is the communication protocol.
  string protocol = 3;

  // metadata contains optional key-value pairs.
  map<string, string> metadata = 4;

  // ttl_seconds is the time-to-live for this registration.
  // The instance will be deregistered if no heartbeat is received within this period.
  int32 ttl_seconds = 5;
}

// RegisterResponse is returned after a successful registration.
message RegisterResponse {
  // instance_id is the assigned identifier for the registered instance.
  string instance_id = 1;
}

// DeregisterRequest removes a service instance.
message DeregisterRequest {
  // instance_id is the instance to remove.
  string instance_id = 1;
}

// DeregisterResponse is returned after deregistration.
message DeregisterResponse {}

// LookupRequest queries instances for a service.
message LookupRequest {
  // service_name is the service to look up.
  string service_name = 1;

  // healthy_only filters for healthy instances only (default: true).
  bool healthy_only = 2;

  // metadata_filter filters instances by metadata key-value pairs.
  map<string, string> metadata_filter = 3;
}

// LookupResponse contains the matching service instances.
message LookupResponse {
  // instances is the list of matching instances.
  repeated ServiceInstance instances = 1;
}

// WatchEventType describes the topology change.
enum WatchEventType {
  WATCH_EVENT_TYPE_UNSPECIFIED = 0;
  WATCH_EVENT_TYPE_REGISTERED = 1;
  WATCH_EVENT_TYPE_DEREGISTERED = 2;
  WATCH_EVENT_TYPE_HEALTH_CHANGED = 3;
}

// WatchRequest subscribes to topology changes for a service.
message WatchRequest {
  // service_name is the service to watch.
  string service_name = 1;
}

// WatchResponse wraps a topology change event.
message WatchResponse {
  // type is the kind of change.
  WatchEventType type = 1;

  // instance is the affected service instance.
  ServiceInstance instance = 2;

  // timestamp is when the change occurred.
  google.protobuf.Timestamp timestamp = 3;
}

// HeartbeatRequest sends a keep-alive for a registered instance.
message HeartbeatRequest {
  // instance_id is the instance sending the heartbeat.
  string instance_id = 1;
}

// HeartbeatResponse is returned after a successful heartbeat.
message HeartbeatResponse {
  // ttl_seconds is the remaining time-to-live before the instance expires.
  int32 ttl_seconds = 1;
}
