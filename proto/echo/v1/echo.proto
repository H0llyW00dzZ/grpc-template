syntax = "proto3";

package echo.v1;

option go_package = "github.com/H0llyW00dzZ/grpc-template/pkg/gen/echo/v1;echov1";

// Echo is a simple service for connectivity testing and debugging.
service Echo {
  // UnaryEcho sends a single message and receives it back.
  rpc UnaryEcho(EchoRequest) returns (EchoResponse) {}

  // ServerStreamingEcho sends a single message and receives a stream of responses.
  rpc ServerStreamingEcho(EchoRequest) returns (stream EchoResponse) {}

  // ClientStreamingEcho receives a stream of messages and returns a single response.
  rpc ClientStreamingEcho(stream EchoRequest) returns (EchoResponse) {}

  // BidirectionalStreamingEcho sends and receives messages in a full-duplex stream.
  rpc BidirectionalStreamingEcho(stream EchoRequest) returns (stream EchoResponse) {}
}

// EchoRequest is the request message.
message EchoRequest {
  // message is the text to echo.
  string message = 1;
}

// EchoResponse is the response message.
message EchoResponse {
  // message is the echoed text.
  string message = 1;
}
