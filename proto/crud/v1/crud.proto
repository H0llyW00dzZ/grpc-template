syntax = "proto3";

package crud.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/field_mask.proto";

option go_package = "github.com/H0llyW00dzZ/grpc-template/pkg/gen/crud/v1;crudv1";
option php_namespace = "Crud\\V1";
option php_metadata_namespace = "GPBMetadata\\Crud\\V1";

// CrudService is a generic CRUD template demonstrating standard resource
// lifecycle operations with pagination and field masks.
service CrudService {
  // CreateItem creates a new item.
  rpc CreateItem(CreateItemRequest) returns (CreateItemResponse) {}

  // GetItem retrieves a single item by ID.
  rpc GetItem(GetItemRequest) returns (GetItemResponse) {}

  // ListItems lists items with pagination support.
  rpc ListItems(ListItemsRequest) returns (ListItemsResponse) {}

  // UpdateItem updates an existing item using a field mask.
  rpc UpdateItem(UpdateItemRequest) returns (UpdateItemResponse) {}

  // DeleteItem deletes an item by ID.
  rpc DeleteItem(DeleteItemRequest) returns (DeleteItemResponse) {}
}

// Item represents a generic resource.
message Item {
  // id is the unique identifier.
  string id = 1;

  // name is the display name.
  string name = 2;

  // description is an optional description.
  string description = 3;

  // create_time is when the item was created.
  google.protobuf.Timestamp create_time = 4;

  // update_time is when the item was last updated.
  google.protobuf.Timestamp update_time = 5;
}

// CreateItemRequest is the request to create an item.
message CreateItemRequest {
  // name is the display name for the new item.
  string name = 1;

  // description is an optional description.
  string description = 2;
}

// CreateItemResponse is the response after creating an item.
message CreateItemResponse {
  // item is the created item.
  Item item = 1;
}

// GetItemRequest is the request to get a single item.
message GetItemRequest {
  // id is the unique identifier of the item.
  string id = 1;
}

// GetItemResponse is the response after getting an item.
message GetItemResponse {
  // item is the retrieved item.
  Item item = 1;
}

// ListItemsRequest is the request to list items with pagination.
message ListItemsRequest {
  // page_size is the maximum number of items to return.
  int32 page_size = 1;

  // page_token is the pagination token from a previous ListItems call.
  string page_token = 2;
}

// ListItemsResponse is the response containing a page of items.
message ListItemsResponse {
  // items is the list of items.
  repeated Item items = 1;

  // next_page_token is the token for the next page (empty if no more pages).
  string next_page_token = 2;
}

// UpdateItemRequest is the request to update an item.
message UpdateItemRequest {
  // item is the item with updated fields.
  Item item = 1;

  // update_mask specifies which fields to update.
  google.protobuf.FieldMask update_mask = 2;
}

// UpdateItemResponse is the response after updating an item.
message UpdateItemResponse {
  // item is the updated item.
  Item item = 1;
}

// DeleteItemRequest is the request to delete an item.
message DeleteItemRequest {
  // id is the unique identifier of the item to delete.
  string id = 1;
}

// DeleteItemResponse is the response after deleting an item.
message DeleteItemResponse {}
