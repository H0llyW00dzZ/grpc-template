apiVersion: v1
kind: Service
metadata:
  name: grpc-server
  labels:
    app: grpc-template
spec:
  selector:
    app: grpc-template
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051
    protocol: TCP
  type: ClusterIP
