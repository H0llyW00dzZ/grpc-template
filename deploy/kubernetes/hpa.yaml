# gRPC in Kubernetes requires careful connection management during scaling.
# When the HPA adds new replicas, existing gRPC clients won't automatically
# redistribute their long-lived HTTP/2 connections to the new pods. This can
# leave new pods idle while existing ones remain overloaded.
#
# How hard this is to solve depends on your cloud provider and networking
# resources/addons — a service mesh can rebalance per-request, or clients
# can use short connection max-age / periodic re-resolve to pick up new
# endpoints. Without these, scale-up events may not relieve load as expected.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: grpc-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: grpc-server
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
  # gRPC connections are long-lived and won't naturally redistribute
  # to new pods. A stabilization window prevents rapid scale-down
  # oscillations that would repeatedly tear down connections.
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
