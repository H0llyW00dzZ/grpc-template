# LoadBalancer Service — exposes the gRPC server to external traffic.
#
# This creates an L4 (TCP) load balancer, which is what gRPC requires for
# proper HTTP/2 passthrough, bidirectional streaming, and trailers.
# On cloud providers (GKE, EKS, AKS) this provisions an external IP automatically.
# On bare-metal clusters, use MetalLB or similar.
#
# To enable: uncomment this file in kustomization.yaml
#
# Best practices added in this 2026 update:
# - appProtocol: grpc
# - externalTrafficPolicy: Local
# - sessionAffinity: None
#
# Note: When using a LoadBalancer, ensure your NetworkPolicy allows
# ingress from external sources (not just in-cluster pods).
#
# gRPC in Kubernetes requires careful connection management. External L4 load
# balancers forward TCP connections without gRPC awareness, so a single client
# may pin all its RPCs to one pod. How hard this is to address depends on your
# cloud provider and networking resources/addons — for example, GKE supports
# gRPC-native health checking on its LBs, AWS NLB can be paired with an
# Envoy sidecar, and bare-metal setups may need a proxy like Envoy or HAProxy
# in front. Evaluate your provider's capabilities before relying on this
# Service for production gRPC traffic.
apiVersion: v1
kind: Service
metadata:
  name: grpc-server-lb
  labels:
    app: grpc-template
  annotations:
    # Cloud-specific annotations (uncomment as needed):
    #
    # GKE — use an internal load balancer:
    # networking.gke.io/load-balancer-type: "Internal"
    #
    # AWS/EKS — use NLB (Network Load Balancer) for TCP/gRPC:
    # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    #
    # Azure/AKS — use an internal load balancer:
    # service.beta.kubernetes.io/azure-load-balancer-internal: "true"
spec:
  selector:
    app: grpc-template
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051
    protocol: TCP
    appProtocol: grpc            # Tells K8s, Gateway API, and service meshes this is gRPC
  type: LoadBalancer
  externalTrafficPolicy: Local   # Recommended for long-lived gRPC connections
  sessionAffinity: None          # gRPC clients usually handle their own load balancing
