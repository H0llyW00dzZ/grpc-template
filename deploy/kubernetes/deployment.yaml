# gRPC in Kubernetes requires careful connection management.
# Unlike REST, gRPC uses persistent HTTP/2 connections that don't naturally
# redistribute when pods scale or restart. This means rolling updates and
# autoscaling events may leave connections pinned to stale endpoints.
#
# How hard this is to handle depends on your cloud provider and networking
# resources/addons (e.g., service mesh like Istio/Linkerd, or a gRPC-aware
# ingress controller). Some environments handle connection re-balancing
# automatically; others require client-side load balancing or look-aside
# balancing via xDS.
#
# The topology spread, graceful termination period, and health probes below
# are designed to minimize disruption, but verify behavior in your specific
# cluster environment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-server
  labels:
    app: grpc-template
spec:
  replicas: 3
  selector:
    matchLabels:
      app: grpc-template
  template:
    metadata:
      labels:
        app: grpc-template
      annotations:
        prometheus.io/scrape: "false"  # Add if you enable metrics later
    spec:
      containers:
      - name: server
        image: grpc-template:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50051
          name: grpc
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        startupProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 10
        livenessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop:
            - ALL
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: grpc-template
      terminationGracePeriodSeconds: 30
