apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grpc-server
spec:
  podSelector:
    matchLabels:
      app: grpc-template
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: grpc-client  # Adjust for your client pods
    - namespaceSelector:
        matchLabels:
          name: default
    ports:
    - protocol: TCP
      port: 50051
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: grpc-template
    ports:
    - protocol: TCP
      port: 50051
  - to:                          # Allow DNS resolution
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
