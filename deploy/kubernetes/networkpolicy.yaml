# gRPC in Kubernetes requires careful connection management, and network
# policies are part of that picture. Since gRPC maintains long-lived TCP
# connections, policy changes may not take effect until clients reconnect.
#
# How network policies interact with gRPC depends on your cloud provider
# and networking resources/addons — the CNI plugin (Calico, Cilium, etc.)
# determines enforcement granularity. Some CNI plugins support L7 policies
# that can inspect gRPC traffic; others only enforce at L3/L4.
# Adjust the selectors below to match your cluster's networking setup.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grpc-server
spec:
  podSelector:
    matchLabels:
      app: grpc-template
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: grpc-client  # Adjust for your client pods
      namespaceSelector:
        matchLabels:
          name: default
    ports:
    - protocol: TCP
      port: 50051
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: grpc-template
    ports:
    - protocol: TCP
      port: 50051
  - to:                          # Allow DNS resolution
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
