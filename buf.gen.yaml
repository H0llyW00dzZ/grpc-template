version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/H0llyW00dzZ/grpc-template/pkg/gen

plugins:
  # Go (can be used as both client and server)
  - remote: buf.build/protocolbuffers/go
    out: pkg/gen
    opt: paths=source_relative

  - remote: buf.build/grpc/go
    out: pkg/gen
    opt: paths=source_relative

  # TypeScript/JavaScript client
  - remote: buf.build/bufbuild/es
    out: pkg/gen-ts

  - remote: buf.build/connectrpc/es
    out: pkg/gen-ts

  # PHP client
  - remote: buf.build/protocolbuffers/php
    out: pkg/gen-php

  - remote: buf.build/grpc/php
    out: pkg/gen-php

  # C/C++ client-only (server is Go; ::Stub is used, ::Service is generated but unused by design)
  - remote: buf.build/protocolbuffers/cpp
    out: pkg/gen-cpp

  - remote: buf.build/grpc/cpp
    out: pkg/gen-cpp

inputs:
  - directory: proto
